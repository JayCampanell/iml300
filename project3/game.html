<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>  When a curated, network internet taste makes it to the real world, who is it for?</title>
    <link rel = "stylesheet" href = "style.css"></link>

    <style>
        body{
            font-family: sans-serif;
            display: flex;
        }
    </style>

    <script src="https://code.jquery.com/jquery-3.7.1.min.js"></script>
    <script src="https://code.jquery.com/ui/1.13.2/jquery-ui.min.js"></script>

    <script src="https://cdnjs.cloudflare.com/ajax/libs/jqueryui-touch-punch/0.2.3/jquery.ui.touch-punch.min.js"></script>

</head>
<body>

    <div id="sidebar">
        <div id="instructions">
            <h3>Spot the Differences</h3>
            <p>Match the storefront to its respective city.</p>
        </div>
        <div id="image-grid"></div>
    </div>

    <div id="drop-area"></div>

    <script>
        const myImages = [
            { src: 'assets/stores/store1.jpg', targetCity: 'Stockholm' },
            { src: 'assets/stores/store2.jpg', targetCity: 'Chiang Mai' },
            { src: 'assets/stores/store3.jpg', targetCity: 'Seoul' },
            { src: 'assets/stores/store4.webp', targetCity: 'Geneva' },
            { src: 'assets/stores/store5.jpg', targetCity: 'Incheon' },
            { src: 'assets/stores/store6.jpg', targetCity: 'Paris' },
            { src: 'assets/stores/store7.jpg', targetCity: 'Tokyo' },
            { src: 'assets/stores/store7.webp', targetCity: 'New York' },
            { src: 'assets/stores/store8.webp', targetCity: 'Berlin' },


        ];

        const cities = ['New York', 'Paris', 'Incheon', 'Tokyo','Seoul','Geneva','Chiang Mai','Stockholm', 'Berlin'];

        const $imageGrid = $('#image-grid');
        const $dropArea = $('#drop-area');

        // dynamically create images in grid
        myImages.forEach((imgData) => {
            // Create the image element and store the correct city as a data attribute
            const $img = $('<img>', {
                src: imgData.src,
                class: 'grid-item',
                'data-correct-city': imgData.targetCity
            });
            
            $imageGrid.append($img);
        });

        // dynamically create dropboxes based on available cities
        cities.forEach(city => {
            const $box = $('<div>', {
                class: 'drop-box',
                text: city,
                'data-city-name': city
            });
            
            $dropArea.append($box);
        });


        // Make the images draggable
        $('.grid-item').draggable({
            zIndex: 1000,
            start: function(event, ui) {
                // add styling to make it look like it is floating
                ui.helper.css({
                    transform: 'scale(1.05)',
                    boxShadow: '0 10px 20px rgba(0,0,0,0.3)',
                    opacity: '1'
                });
            },
            // revert to srtart if the item is dropped or if it is in the wrong box
            revert: function(droppedElement) {
                if (!droppedElement) {
                    return true; 
                }

                const targetCity = droppedElement.data('city-name');
                const correctCity = $(this).data('correct-city'); 

                // check if it is right
                if (targetCity === correctCity) {
                    return false; 
                } else {
                    // shake screen if wrong
                    $('body').addClass('error-shake');
                    $('sidebar').addClass('error-shake');
                    $('instructions').addClass('error-shake')
                    setTimeout(() => {
                        $('body').removeClass('error-shake');
                        $('sidebar').removeClass('error-shake');
                        $('instructions').addClass('error-shake');
                    }, 400);
                    
                    return true; // Snap the image back to the grid
                }
            }
        });

        $('.drop-box').droppable({
            accept: '.grid-item',
            hoverClass: 'drag-over', 
            drop: function(event, ui) {
                const targetCity = $(this).data('city-name');
                const correctCity = ui.draggable.data('correct-city');

                // fade away if correct city
                if (targetCity === correctCity) {
                    // ui.draggable refers to the original grid item, not the clone
                    ui.draggable.addClass('fade-away');
                }
            }
    });
</script>
</body>
</html>
