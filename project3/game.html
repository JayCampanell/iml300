<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Image Mapper</title>
    
     <link rel="stylesheet" href="https://unpkg.com/leaflet@1.9.4/dist/leaflet.css"
     integrity="sha256-p4NxAoJBhIIN+hmNHrzRCf9tD/miZyoHS5obTRR9BMY="
     crossorigin=""/>
    <script src="https://unpkg.com/leaflet@1.9.4/dist/leaflet.js"
     integrity="sha256-20nQCchB9co0qIjJZRGuk2/Z9VM+kNiyxNV1lvTlZBo="
     crossorigin=""></script>

    <style>
        body, html {
            margin: 0;
            padding: 0;
            height: 100%;
            font-family: sans-serif;
            display: flex;
        }

        /* Sidebar for the Image Grid */
        #sidebar {
            width: 350px;
            background-color: #f4f4f4;
            display: flex;
            flex-direction: column;
            border-right: 2px solid #ccc;
        }

        #instructions {
            padding: 20px;
            background: #fff;
            border-bottom: 1px solid #ddd;
            box-shadow: 0 2px 5px rgba(0,0,0,0.05);
        }

        #instructions h3 {
            margin: 0 0 10px 0;
            color: #333;
        }

        #instructions p {
            margin: 0;
            font-size: 14px;
            color: #666;
        }

        /* The Grid Itself */
        #image-grid {
            padding: 10px;
            overflow-y: auto;
            flex-grow: 1;
            display: grid;
            grid-template-columns: repeat(2, 1fr);
            gap: 10px;
            align-content: start;
        }

        .grid-item {
            width: 100%;
            aspect-ratio: 1 / 1;
            object-fit: cover;
            cursor: pointer;
            border: 3px solid transparent;
            border-radius: 4px;
            transition: transform 0.1s, border-color 0.1s;
            background-color: #eee; /* Placeholder color while loading */
        }

        .grid-item:hover {
            transform: scale(1.02);
        }

        /* State Classes */
        .grid-item.selected {
            border-color: #0078D7;
            box-shadow: 0 0 10px rgba(0, 120, 215, 0.5);
        }

        .grid-item.placed {
            opacity: 0.3;
            pointer-events: none; /* Prevents selecting it again */
            filter: grayscale(100%);
        }

        /* The Map Area */
        #map {
            flex-grow: 1;
            height: 100%;
        }

        /* Customizes the image inside the map popup */
        .leaflet-popup-content img {
            width: 150px;
            height: auto;
            border-radius: 4px;
        }
    </style>
</head>
<body>

    <div id="sidebar">
        <div id="instructions">
            <h3>Map the Photos</h3>
            <p>1. Click a photo in the grid.<br>2. Click on the map to place it.</p>
        </div>
        <div id="image-grid"></div>
    </div>

    <div id="map"></div>

    <script src="https://unpkg.com/leaflet@1.9.4/dist/leaflet.js"></script>
    <script>
        // 1. Initialize the Map (Centered on the US)
        const map = L.map('map').setView([39.8283, -98.5795], 4);

        // 2. State Variables
        let currentSelectedImage = null; 
        let currentSelectedSrc = null;   

        // ==========================================
        // 3. YOUR ASSET LIST (Update these filenames)
        // ==========================================
        const myImages = [
            'assets/stores/store1.jpg',
            'assets/stores/store2.jpg',
            'assets/stores/store3.jpg',
            'assets/stores/store4.webp',
            'assets/stores/store5.jpg',
            'assets/stores/store6.jpg',
            'assets/stores/store7.jpg',
            'assets/stores/store7.webp',
        ];

        // 4. Load the Images into the Grid automatically
        const imageGrid = document.getElementById('image-grid');

        myImages.forEach(imagePath => {
            const imgElement = document.createElement('img');
            imgElement.src = imagePath;
            imgElement.className = 'grid-item';
            
            // Click event to select the image
            imgElement.addEventListener('click', () => {
                selectImage(imgElement, imagePath);
            });

            imageGrid.appendChild(imgElement);
        });

        // 5. Handle Selection Logic
        function selectImage(imgElement, imageUrl) {
            if (currentSelectedImage) {
                currentSelectedImage.classList.remove('selected');
            }

            currentSelectedImage = imgElement;
            currentSelectedSrc = imageUrl;
            currentSelectedImage.classList.add('selected');
        }

        // 6. Handle Map Clicking (Placing the Image)
        map.on('click', function(e) {
            if (!currentSelectedSrc) return; // Do nothing if no image is selected

            // Create a marker at the clicked coordinates
            const marker = L.marker([e.latlng.lat, e.latlng.lng]).addTo(map);

            // Bind a popup to the marker containing the image
            marker.bindPopup(`<img src="${currentSelectedSrc}" alt="Placed image">`).openPopup();

            // Mark the image as placed in the grid
            currentSelectedImage.classList.remove('selected');
            currentSelectedImage.classList.add('placed');
            
            // Clear current selection
            currentSelectedImage = null;
            currentSelectedSrc = null;
        });
    </script>
</body>
</html>
