<!DOCTYPE html>
<html lang="en">
  <head>

    <title>Floating Memories</title>

    <script src="https://www.gstatic.com/firebasejs/8.2.3/firebase.js"></script>

    <link rel="stylesheet" href="style.css" />
    
    <script src="script.js" defer></script>
